<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Bento Makhraj</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        @font-face {
            font-family: 'Muhammadi';
            src: url('Muhammadi.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Nastaleeq';
            src: url('nastaleeq.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-primary: #121418;       
            --bg-secondary: #1a1d24;     
            
            --color-throat: #2c2e3e;     
            --color-tongue: #283130;     
            --color-lips: #382d2a;       
            --color-nose: #2b2b2b;       
            --color-cavity: #252c31;     

            --text-main: #f3f4f6;
            --text-muted: #8a94a6;
            --border-ui: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-primary);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        .screen-content {
            height: 100vh;
            width: 100vw;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .view-section {
            display: none;
            width: 100%;
            height: 100%;
        }

        .view-section.active {
            display: flex;
            flex-direction: column;
        }

        /* --- TOP HEADER PREVIEW --- */
        #hover-preview-panel {
            height: 150px; 
            width: 100vw;
            background-color: var(--bg-secondary); 
            border-bottom: 1px solid var(--border-ui);
            display: flex;
            justify-content: space-between; 
            align-items: center;
            padding: 0 4rem;
            z-index: 10;
            transition: background-color 0.4s ease;
        }

        .preview-text-trigger {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin: 0 2rem;
            overflow: hidden;
        }

        .preview-urdu {
            font-family: 'Nastaleeq', serif;
            font-size: 2.1rem; 
            line-height: 1.5;
            direction: rtl;
            color: var(--text-main);
            text-align: center;
            width: 100%;
            max-width: 1100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: opacity 0.3s ease;
        }

        /* Architectural Minimal Arrows */
        .nav-arrow {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            width: 45px; 
            height: 45px;
            border-radius: 4px; 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.25s ease;
            user-select: none;
            z-index: 20;
        }

        .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--text-main);
        }

        /* --- BENTO GRID SYSTEM --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(30, 1fr);
            grid-template-rows: 2.3fr 1fr; 
            flex: 1; 
            width: 100%;
            gap: 15px;
            padding: 15px;
        }

        .major-region {
            display: flex;
            flex-direction: column;
            padding: 16px;
            height: 100%;
            overflow: hidden;
            border-radius: 8px; 
            border: 1px solid var(--border-ui);
        }
        
        .throat { grid-column: span 6;  background-color: var(--color-throat); }
        .tongue { grid-column: span 24; background-color: var(--color-tongue); }
        .lips   { grid-column: span 20; background-color: var(--color-lips); }
        .nose   { grid-column: span 5;  background-color: var(--color-nose); }
        .cavity { grid-column: span 5;  background-color: var(--color-cavity); }

        .major-title {
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 18px;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .sub-container {
            display: grid;
            gap: 8px;
            height: calc(100% - 33px);
        }

        .throat .sub-container { grid-template-rows: repeat(3, 1fr); }
        .tongue .sub-container { grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(2, 1fr); }
        .lips .sub-container   { grid-template-columns: repeat(4, 1fr); grid-template-rows: 1fr; }
        .nose .sub-container   { grid-template-rows: 1fr; }
        .cavity .sub-container { grid-template-rows: 1fr; }

        .clickable-box {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            height: 100%;
            overflow: hidden;
            outline: none;
        }

        .clickable-box:hover {
            background-color: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .clickable-box.selected, .clickable-box:focus {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .box-letters {
            font-family: 'Muhammadi', serif;
            font-size: 1.8rem;
            direction: rtl;
            color: var(--text-main);
        }

        /* --- READABLE PLAIN DETAIL VIEW (NO WRAPPER BOX) --- */
        #detail-view {
            width: 100%;
            height: 100vh;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 50;
            padding: 0 100px; /* Leaves space for side arrows */
            background-color: var(--bg-primary);
            transition: background-color 0.4s ease;
        }

        #detail-view.active {
            display: flex;
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 60;
        }

        .back-btn:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--text-main);
        }

        /* Side navigation arrows for Detail Page */
        .detail-side-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.25s ease;
            z-index: 60;
        }

        .detail-side-nav:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .detail-side-nav.left { left: 2rem; }
        .detail-side-nav.right { right: 2rem; }

        .plain-container {
            width: 100%;
            max-width: 1100px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            opacity: 1;
            transition: opacity 0.3s ease; /* Fade contents on change */
        }

        .detail-header-loc {
            font-size: 0.75rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 2rem;
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
        }

        .detail-letters {
            font-family: 'Muhammadi', serif;
            font-size: 7rem;
            line-height: 1;
            margin-bottom: 2.5rem;
            color: var(--text-main);
        }

        .detail-desc-urdu {
            font-family: 'Nastaleeq', serif;
            font-size: 2.4rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            direction: rtl;
            color: var(--text-main);
            max-width: 90%;
        }

        .detail-desc-eng {
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            line-height: 1.6;
            font-weight: 300;
            color: var(--text-muted);
            max-width: 85%;
        }

        @media (max-width: 1000px) {
            .bento-grid {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(5, auto);
                height: auto;
                overflow-y: auto;
            }
            .major-region {
                grid-column: span 1 !important;
                height: auto;
                min-height: 250px;
            }
            .sub-container {
                height: auto;
                grid-template-columns: repeat(3, 1fr) !important;
                grid-template-rows: auto !important;
            }
            .clickable-box {
                height: 100px;
            }
            .detail-letters { font-size: 4.5rem; }
            .detail-desc-urdu { font-size: 1.8rem; }
            #detail-view { padding: 0 60px; }
        }
    </style>
</head>
<body>

<div class="screen-content">

    <div id="dashboard-view" class="view-section active">
        
        <div id="hover-preview-panel">
            <div class="nav-arrow" onclick="navPrev()">
                <i class="fas fa-arrow-left"></i>
            </div>

            <div class="preview-text-trigger" onclick="openDetailView()">
                <div class="preview-urdu" id="preview-text"></div>
            </div>

            <div class="nav-arrow" onclick="navNext()">
                <i class="fas fa-arrow-right"></i>
            </div>
        </div>

        <div class="bento-grid">
            <div class="major-region throat">
                <div class="major-title">Al-Halq</div>
                <div class="sub-container">
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(0)">
                        <div class="box-letters">غ , خ</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(1)">
                        <div class="box-letters">ع , ح</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(2)">
                        <div class="box-letters">ء , ه</div>
                    </div>
                </div>
            </div>

            <div class="major-region tongue">
                <div class="major-title">Al-Lisaan</div>
                <div class="sub-container">
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(3)">
                        <div class="box-letters">ق</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(4)">
                        <div class="box-letters">ك</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(5)">
                        <div class="box-letters">ج</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(6)">
                        <div class="box-letters">ش</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(7)">
                        <div class="box-letters">ي</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(8)">
                        <div class="box-letters">ض</div>
                    </div>
                    
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(9)">
                        <div class="box-letters">ت , د , ط</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(10)">
                        <div class="box-letters">ز , س , ص</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(11)">
                        <div class="box-letters">ث , ذ , ظ</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(12)">
                        <div class="box-letters">ل</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(13)">
                        <div class="box-letters">ن</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(14)">
                        <div class="box-letters">ر</div>
                    </div>
                </div>
            </div>

            <div class="major-region lips">
                <div class="major-title">Ash-Shafataan</div>
                <div class="sub-container">
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(15)">
                        <div class="box-letters">ف</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(16)">
                        <div class="box-letters">ب</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(17)">
                        <div class="box-letters">م</div>
                    </div>
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(18)">
                        <div class="box-letters">و</div>
                    </div>
                </div>
            </div>

            <div class="major-region nose">
                <div class="major-title">Al-Khayshoom</div>
                <div class="sub-container">
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(19)">
                        <div class="box-letters" style="font-family: 'Poppins', sans-serif; font-size: 1.1rem; font-weight: 500;">Ghunnah</div>
                    </div>
                </div>
            </div>

            <div class="major-region cavity">
                <div class="major-title">Al-Jawf</div>
                <div class="sub-container">
                    <div class="clickable-box" tabindex="0" onclick="selectLetter(20)">
                        <div class="box-letters">ا , و , ي</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="detail-view">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> BACK
        </button>

        <div class="detail-side-nav left" onclick="navPrev()">
            <i class="fas fa-chevron-left"></i>
        </div>
        <div class="detail-side-nav right" onclick="navNext()">
            <i class="fas fa-chevron-right"></i>
        </div>

        <div class="plain-container" id="detail-plain-container">
            <div class="detail-header-loc" id="header-loc-label"></div>
            <div class="detail-letters" id="letters-label"></div>
            <div class="detail-desc-urdu" id="desc-urdu-label"></div>
            <div class="detail-desc-eng" id="desc-eng-label"></div>
        </div>
    </div>

</div>

<script>
    const makhrajData = [
        { main: 'Al-Halq', sub: 'Adna al-Halq (Top Throat)', letters: 'غ , خ', eng: 'produced closest to the mouth.', urdu: 'یہ منہ کے سب سے قریبی حصے (حلق کے اوپر والے حصے) سے ادا ہوتے ہیں۔', color: 'var(--color-throat)' },
        { main: 'Al-Halq', sub: 'Wast al-Halq (Middle Throat)', letters: 'ع , ح', eng: 'produced from the middle of the throat.', urdu: 'یہ گلے کے بالکل درمیان والے حصے سے ادا ہوتے ہیں۔', color: 'var(--color-throat)' },
        { main: 'Al-Halq', sub: 'Aqsa al-Halq (Deep Throat)', letters: 'ء , ه', eng: 'produced nearest to the chest.', urdu: 'یہ سینے کے سب سے قریبی حصے (حلق کے آخری حصے) سے ادا ہوتے ہیں۔', color: 'var(--color-throat)' },
        { main: 'Al-Lisaan', sub: 'Aqsa al-Lisaan (Back of Tongue)', letters: 'ق', eng: 'When the tongue\'s root meets the soft area of the upper palate, a heavy sound letter is produced.', urdu: 'جب زبان کی جڑ اوپر کے نرم تالو سے ملتی ہے، تو یہ پُر آواز حرف ادا ہوتا ہے۔', color: 'var(--color-tongue)' },
        { main: 'Al-Lisaan', sub: 'Aqsa al-Lisaan (Back of Tongue)', letters: 'ك', eng: 'It is articulated from the back of the tongue connecting with the hard palate opposite to it.', urdu: 'یہ زبان کے پچھلے حصے کے بالمقابل سخت تالو سے جڑنے پر ادا ہوتا ہے۔', color: 'var(--color-tongue)' },
        { main: 'Al-Lisaan', sub: 'Wast al-Lisaan (Middle of Tongue)', letters: 'ج', eng: 'When the middle of the tongue (Wastul Lisaan) and opposite palate are completely joined, letter Jeem is articulated.', urdu: 'جب زبان کا وسط اور اس کے بالمقابل تالو مکمل طور پر مل جائیں تو جیم ادا ہوتا ہے۔', color: 'var(--color-tongue)' },
        { main: 'Al-Lisaan', sub: 'Wast al-Lisaan (Middle of Tongue)', letters: 'ش', eng: 'The letter sheen is articulated when the opposing palate and middle of the tongue are not fully connected and leave a small opening for air.', urdu: 'حرف شین تب ادا ہوتا ہے جب زبان کا وسط اور بالمقابل تالو کے درمیان ہوا کا معمولی راستہ رہے۔', color: 'var(--color-tongue)' },
        { main: 'Al-Lisaan', sub: 'Wast al-Lisaan (Middle of Tongue)', letters: 'ي', eng: 'The letter Yaa is articulated when the opposing palate and the middle of the tongue leave a larger gap for air passage than sheen.', urdu: 'حرف یاء تب ادا ہوتا ہے جب زبان کا درمیان اور بالمقابل تالو کے درمیان ہوا کا بڑا خلا ہو۔', color: 'var(--color-tongue)' },
        { main: 'Al-Lisaan', sub: 'Hafatul Lisaan (Sides of Tongue)', letters: 'ض', eng: 'The tongue\'s left or right upturned sides are raised to touch the top back upper molars.', urdu: 'زبان کی دائیں یا بائیں اوپر اٹھی ہوئی کروٹیں جب اوپر کی داڑھوں سے لگتی ہیں۔', color: 'var(--color-tongue)' },
        { main: 'Al-Lisaan', sub: 'Taraf al-Lisaan (Tip of Tongue)', letters: 'ت , د , ط', eng: 'Articulated from the top part of the tip of the tongue, touching the roots of the upper incisors (top front teeth).', urdu: 'زبان کی نوک کے اوپری حصے کے اوپر کے اگلے دانتوں کی جڑوں سے لگنے سے ادا ہوتے ہیں۔', color: 'var(--color-tongue)' },
        { main: 'Al-Lisaan', sub: 'Taraf al-Lisaan (Tip of Tongue)', letters: 'ز , س , ص', eng: 'These letters are articulated by pressing the tip of the tongue against the inner part of the lower front teeth.', urdu: 'یہ حروف زبان کی نوک کو نیچے کے سامنے والے دانتوں کے اندرونی حصے پر دبانے سے ادا ہوتے ہیں۔', color: 'var(--color-tongue)' },
        { main: 'Al-Lisaan', sub: 'Taraf al-Lisaan (Tip of Tongue)', letters: 'ث , ذ , ظ', eng: 'Articulated when the top of the tip of the tongue touches the edges of the top 2 incisors (part of the tongue will stick out).', urdu: 'زبان کی نوک کا اوپر کا حصہ جب سامنے کے دانتوں کے کناروں سے لگتا ہے (زبان تھوڑی باہر رہے گی)۔', color: 'var(--color-tongue)' },
        { main: 'Al-Lisaan', sub: 'Taraf al-Lisaan (Edge of Tongue)', letters: 'ل', eng: 'Originates from the front edge of the tongue, touching the back gums of the upper teeth.', urdu: 'زبان کے اگلے کنارے کے اوپر کے دانتوں کے مسوڑھوں سے ادا ہوتا ہے۔', color: 'var(--color-tongue)' },
        { main: 'Al-Lisaan', sub: 'Taraf al-Lisaan (Edge of Tongue)', letters: 'ن', eng: 'Articulated from the edge of the tongue touching the roots of the upper teeth.', urdu: 'زبان کے کنارے کے اوپر کے دانتوں کی جڑوں سے ادا ہوتا ہے۔', color: 'var(--color-tongue)' },
        { main: 'Al-Lisaan', sub: 'Taraf al-Lisaan (Tip to Gums)', letters: 'ر', eng: 'When the top part of tip of the tongue touches the gums of the upper teeth.', urdu: 'جب زبان کی نوک کا اوپر کا حصہ اوپر والے دانتوں کے مسوڑھوں سے لگتا ہے۔', color: 'var(--color-tongue)' },
        { main: 'Ash-Shafataan', sub: 'The Lips - Teeth Connection', letters: 'ف', eng: 'This letter is sounded when the edges of the front two teeth touch the wet portion of the bottom lip.', urdu: 'جب سامنے کے دو دانتوں کے کنارے نچلے ہونٹ کے گیلے حصے سے لگ کر الگ ہوتے ہیں۔', color: 'var(--color-lips)' },
        { main: 'Ash-Shafataan', sub: 'The Lips - Closed Wet', letters: 'ب', eng: 'This letter is sounded when the wet portion of the lips open from a closed position.', urdu: 'جب ہونٹوں کا گیلا حصہ بند حالت سے کھلتا ہے۔', color: 'var(--color-lips)' },
        { main: 'Ash-Shafataan', sub: 'The Lips - Closed Dry', letters: 'م', eng: 'This letter is sounded when the dry portion of the lips open from a closed position.', urdu: 'جب ہونٹوں کا خشک حصہ بند حالت سے کھلتا ہے۔', color: 'var(--color-lips)' },
        { main: 'Ash-Shafataan', sub: 'The Lips - Circle Shape', letters: 'و', eng: 'The un-lengthened Waow is articulated by forming a circle of the two lips without the two lips meeting completely.', urdu: 'غیر مدہ واؤ دونوں ہونٹوں کو مکمل ملائے بغیر گول دائرے کی شکل دے کر ادا کیا جاتا ہے۔', color: 'var(--color-lips)' },
        { main: 'Al-Khayshoom', sub: 'Nasal Cavity & Passage', letters: 'Ghunnah', eng: 'Al Khayshoom has one articulation point, from the nostrils going down.', urdu: 'خیشوم کا ایک ہی مخرج ہے، جو ناک کے نتھنوں سے نیچے کی طرف جاتا ہے۔', color: 'var(--color-nose)' },
        { main: 'Al-Jawf', sub: 'The Hollow Mouth and Throat Space', letters: 'ا , و , ي', eng: 'The empty space between the mouth and throat serves as location and an articulation point. Sound ends with air emptying out.', urdu: 'منہ اور گلے کے درمیان کی خالی جگہ جہاں حروف کی آواز ہوا کے ختم ہونے کے ساتھ ختم ہو جاتی ہے۔', color: 'var(--color-cavity)' }
    ];

    let currentIndex = 0; 

    function selectLetter(index) {
        currentIndex = index;
        const data = makhrajData[index];
        
        // Dynamic dashboard elements
        const panel = document.getElementById('hover-preview-panel');
        const previewText = document.getElementById('preview-text');

        panel.style.backgroundColor = data.color; 
        
        previewText.style.opacity = '0';
        setTimeout(() => {
            previewText.innerText = data.urdu;
            previewText.style.opacity = '1';
        }, 150);

        // Highlight selected bento card
        const boxes = document.querySelectorAll('.clickable-box');
        boxes.forEach((box, i) => {
            if (i === index) {
                box.classList.add('selected');
                box.focus(); 
            } else {
                box.classList.remove('selected');
            }
        });

        // Sync with dynamic detail elements if currently open
        if(document.getElementById('detail-view').classList.contains('active')) {
            updateDetailText(data);
        }
    }

    function navPrev() {
        let prevIndex = currentIndex - 1;
        if (prevIndex < 0) prevIndex = makhrajData.length - 1;
        selectLetter(prevIndex);
    }

    function navNext() {
        let nextIndex = currentIndex + 1;
        if (nextIndex >= makhrajData.length) nextIndex = 0;
        selectLetter(nextIndex);
    }

    function openDetailView() {
        updateDetailText(makhrajData[currentIndex]);
        document.getElementById('dashboard-view').style.display = 'none';
        document.getElementById('detail-view').classList.add('active');
    }

    /* Helper utility to handle textual swapping with nice fade-ins */
    function updateDetailText(data) {
        const container = document.getElementById('detail-plain-container');
        const detailView = document.getElementById('detail-view');

        detailView.style.backgroundColor = data.color;

        container.style.opacity = '0';
        setTimeout(() => {
            document.getElementById('header-loc-label').innerText = `${data.main} — ${data.sub}`;
            document.getElementById('letters-label').innerText = data.letters;
            document.getElementById('desc-urdu-label').innerText = data.urdu;
            document.getElementById('desc-eng-label').innerText = data.eng;
            container.style.opacity = '1';
        }, 200);
    }

    function goBack() {
        document.getElementById('detail-view').classList.remove('active');
        document.getElementById('dashboard-view').style.display = 'flex';
    }

    window.onload = function() {
        selectLetter(0);
    };

    document.addEventListener('keydown', function(event) {
        // Universal Left & Right arrow handling across both main and detail states
        if (event.key === 'ArrowRight' || event.key === 'ArrowDown') {
            event.preventDefault();
            navNext();
        } else if (event.key === 'ArrowLeft' || event.key === 'ArrowUp') {
            event.preventDefault();
            navPrev();
        } else if (event.key === 'Enter' && document.getElementById('dashboard-view').style.display !== 'none') {
            openDetailView();
        }
    });
</script>
</body>
</html>
